name: AI Referee CI

on:
  pull_request:
    branches: [ main ]

jobs:
  verify-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm ci

      - name: Enforce Formatting & Linting
        run: npm run lint

      - name: Run TDD Suite (Unit & Feature)
        run: npm test

      - name: SAST Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: 1